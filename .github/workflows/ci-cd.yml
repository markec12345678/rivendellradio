name: CI/CD — Rock 88.7 Broadcast Control Center

on:
  push:
    branches: [main, web-dashboard]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ============================================================================
  # Job 1: Lint + Typecheck + Build
  # ============================================================================
  quality:
    name: Lint + Typecheck + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (ESLint)
        run: bun run lint

      - name: Typecheck (TypeScript)
        run: bunx tsc --noEmit

      - name: Prisma generate
        run: bun run db:generate

      - name: Build (Next.js standalone)
        run: bun run build
        env:
          DATABASE_URL: file:./db/ci.db
          NEXT_TELEMETRY_DISABLED: 1

  # ============================================================================
  # Job 2: Security — SBOM + dependency scanning
  # ============================================================================
  security:
    name: Security — SBOM + CVE Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install
        run: bun install --frozen-lockfile

      - name: Generate CycloneDX SBOM
        run: |
          bunx @cyclonedx/cyclonedx-npm --output-file sbom.json --output-format json
          cat sbom.json | head -20

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json

      - name: npm audit (high+critical)
        run: bunx npm-audit --audit-level=high || true

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  # ============================================================================
  # Job 3: Build + push Docker image to GHCR
  # ============================================================================
  build-image:
    name: Build + Push Docker Image
    needs: [quality, security]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build + push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================================
  # Job 4: Deploy — blue-green (flip Caddy upstream via SSH)
  # ============================================================================
  deploy-blue-green:
    name: Deploy (Blue-Green)
    needs: [build-image]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://rock887.fm
    steps:
      - uses: actions/checkout@v4

      - name: Determine target color (blue/green)
        id: color
        run: |
          # Alternate between blue and green on each deploy
          CURRENT=$(curl -sf ${{ secrets.DEPLOY_URL }}/api/v1/health/deploy | jq -r .color || echo "blue")
          if [ "$CURRENT" = "blue" ]; then
            echo "target=green" >> $GITHUB_OUTPUT
          else
            echo "target=blue" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to ${{ steps.color.outputs.target }}
        run: |
          echo "Deploying image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest to ${{ steps.color.outputs.target }} slot"
          ssh ${{ secrets.DEPLOY_HOST }} << EOF
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            docker stop rock887-${{ steps.color.outputs.target }} || true
            docker rm rock887-${{ steps.color.outputs.target }} || true
            docker run -d --name rock887-${{ steps.color.outputs.target }} \\
              -p ${{ steps.color.outputs.target == 'blue' && '3001' || '3002' }}:3000 \\
              -e DATABASE_URL=file:/app/db/custom.db \\
              -e BROADCAST_FEED_URL=http://broadcast-feed:3003 \\
              -v rock887-db:/app/db \\
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          EOF

      - name: Health check (60s warmup)
        run: |
          for i in {1..30}; do
            if curl -sf ${{ secrets.DEPLOY_URL }}:${{ steps.color.outputs.target == 'blue' && '3001' || '3002' }}/api/v1/health/ready | jq -e .ready; then
              echo "Health check passed"
              exit 0
            fi
            sleep 2
          done
          echo "Health check failed — rolling back"
          exit 1

      - name: Swap Caddy upstream (flip)
        if: success()
        run: |
          ssh ${{ secrets.DEPLOY_HOST }} << EOF
            # Update Caddyfile to point to new slot
            sed -i 's/localhost:300[12]/localhost:${{ steps.color.outputs.target == 'blue' && '3001' || '3002' }}/' /etc/caddy/Caddyfile
            caddy reload --config /etc/caddy/Caddyfile
          EOF

      - name: Auto-rollback on failure
        if: failure()
        run: |
          echo "Rolling back to previous slot"
          ssh ${{ secrets.DEPLOY_HOST }} << EOF
            sed -i 's/localhost:300[12]/localhost:${{ steps.color.outputs.target == 'blue' && '3002' || '3001' }}/' /etc/caddy/Caddyfile
            caddy reload --config /etc/caddy/Caddyfile
          EOF

      - name: Cleanup old slot
        if: success()
        run: |
          ssh ${{ secrets.DEPLOY_HOST }} << EOF
            docker stop rock887-${{ steps.color.outputs.target == 'blue' && 'green' || 'blue' }} || true
          EOF
