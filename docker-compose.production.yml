# ============================================================================
# docker-compose.production.yml — Rock 88.7 Full Production Stack
#
# One command to run the ENTIRE radio station:
#   docker compose -f docker-compose.production.yml up -d
#
# Includes:
#   - Rock 88.7 web application (dashboard + AI + governance)
#   - Broadcast feed WebSocket service
#   - Icecast2 streaming server
#   - Liquidsoap audio playout engine
#   - SQLite database (persistent volume)
#   - Automatic backups (daily)
#   - Log rotation + health monitoring
#
# Prerequisites:
#   - Docker + Docker Compose installed
#   - .env file with LISTENER_HASH_SALT
#   - MP3 files in /music/ directory
#
# See: docs/INSTALL-IN-15-MINUTES.md
# ============================================================================

name: rock887-production

services:
  # ============================================================================
  # Rock 88.7 Web Application (Next.js — the "brain")
  # ============================================================================
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rock887-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/db/custom.db
      - LISTENER_HASH_SALT=${LISTENER_HASH_SALT}
      - INTERNAL_API_BASE=http://localhost:3000
      - BROADCAST_FEED_URL=http://feed:3003
      - ICECAST_URL=http://icecast:8000
      - NEXT_TELEMETRY_DISABLED=1
    volumes:
      - rock887-db:/app/db
      - rock887-logs:/app/logs
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3000/api/v1/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    depends_on:
      - feed
      - icecast

  # ============================================================================
  # Broadcast Feed WebSocket Service
  # ============================================================================
  feed:
    build:
      context: ./mini-services/broadcast-feed
      dockerfile: Dockerfile
    container_name: rock887-feed
    restart: unless-stopped
    ports:
      - "3003:3003"
    environment:
      - NODE_ENV=production
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3003/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ============================================================================
  # Icecast2 — Streaming Server (listeners connect here)
  # ============================================================================
  icecast:
    build:
      context: .
      dockerfile: deploy/icecast2/Dockerfile
    container_name: rock887-icecast
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - icecast-logs:/var/log/icecast2
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8000/status-json.xsl"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  # ============================================================================
  # Liquidsoap — Audio Playout Engine (reads from Media Library, streams to Icecast2)
  # ============================================================================
  liquidsoap:
    build:
      context: .
      dockerfile: deploy/liquidsoap/Dockerfile
    container_name: rock887-liquidsoap
    restart: unless-stopped
    environment:
      - ROCK887_URL=http://web:3000
      - ICECAST_HOST=icecast
      - ICECAST_PORT=8000
      - ICECAST_PASSWORD=hackme
    volumes:
      - ${MUSIC_DIR:-./music}:/music:ro
      - liquidsoap-logs:/var/log/liquidsoap
    depends_on:
      icecast:
        condition: service_healthy
      web:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "pgrep", "-x", "liquidsoap"]
      interval: 60s
      timeout: 10s
      start_period: 30s
      retries: 3

  # ============================================================================
  # Icecast2 Listener Adapter — polls Icecast2, POSTs sessions to Rock 88.7
  # ============================================================================
  adapter:
    build:
      context: .
      dockerfile: deploy/adapter/Dockerfile
    container_name: rock887-adapter
    restart: unless-stopped
    environment:
      - ICECAST_URL=http://icecast:8000
      - ICECAST_MOUNT=/rock-887.mp3
      - ROCK887_URL=http://web:3000
      - LISTENER_HASH_SALT=${LISTENER_HASH_SALT}
      - POLL_INTERVAL=60
    depends_on:
      icecast:
        condition: service_healthy
      web:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # ============================================================================
  # Automatic Database Backup (daily at 03:00)
  # ============================================================================
  backup:
    image: alpine:3.19
    container_name: rock887-backup
    restart: unless-stopped
    environment:
      - BACKUP_SCHEDULE=0 3 * * *
      - BACKUP_RETENTION_DAYS=30
    volumes:
      - rock887-db:/data:ro
      - rock887-backups:/backups
      - ./scripts/backup.sh:/backup.sh:ro
    entrypoint: ["/bin/sh", "/backup.sh"]
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  rock887-db:
    driver: local
  rock887-logs:
    driver: local
  rock887-backups:
    driver: local
  icecast-logs:
    driver: local
  liquidsoap-logs:
    driver: local
