# Rock 88.7 — Kubernetes Operator
# Custom Resource Definition + Controller for automated deployment
#
# This Operator manages Rock 88.7 broadcast platform on Kubernetes:
#   - Automated deployment with rolling updates
#   - Health checks + auto-recovery
#   - Horizontal scaling (web + feed)
#   - Database persistence + backups
#   - Configuration management
#
# Install: kubectl apply -f k8s/operator.yaml
# Usage: kubectl apply -f k8s/rock887-instance.yaml

---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: rock887platforms.rock887.fm
spec:
  group: rock887.fm
  names:
    kind: Rock887Platform
    listKind: Rock887PlatformList
    plural: rock887platforms
    singular: rock887platform
    shortNames:
      - rock887
      - r887
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          required: ["spec"]
          properties:
            spec:
              type: object
              required: ["version"]
              properties:
                # Version to deploy
                version:
                  type: string
                  description: "Rock 88.7 platform version (e.g., 4.4.1)"
                # Replicas
                webReplicas:
                  type: integer
                  minimum: 1
                  maximum: 10
                  default: 2
                feedReplicas:
                  type: integer
                  minimum: 1
                  maximum: 5
                  default: 1
                # Resources
                resources:
                  type: object
                  properties:
                    requests:
                      type: object
                      properties:
                        cpu: { type: string, default: "500m" }
                        memory: { type: string, default: "512Mi" }
                    limits:
                      type: object
                      properties:
                        cpu: { type: string, default: "2000m" }
                        memory: { type: string, default: "2Gi" }
                # Database
                database:
                  type: object
                  properties:
                    storage: { type: string, default: "10Gi" }
                    storageClass: { type: string, default: "standard" }
                    backupSchedule: { type: string, default: "0 2 * * *" }
                    backupRetention: { type: integer, default: 30 }
                # Broadcast configuration
                broadcast:
                  type: object
                  properties:
                    stationId: { type: string, default: "main-fm" }
                    frequency: { type: string, default: "88.7" }
                    icecastUrl: { type: string }
                    rdxportUrl: { type: string }
                # Observability
                observability:
                  type: object
                  properties:
                    otelCollector: { type: string, default: "http://otel-collector:4318" }
                    prometheus: { type: boolean, default: true }
                    grafana: { type: boolean, default: true }
                    loki: { type: boolean, default: true }
                # High availability
                ha:
                  type: object
                  properties:
                    enabled: { type: boolean, default: true }
                    raftCluster: { type: boolean, default: false }
                    failoverThreshold: { type: integer, default: 60 }
                # EAS/CAP
                eas:
                  type: object
                  properties:
                    ipawsEnabled: { type: boolean, default: false }
                    cogId: { type: string }
                    testSchedule: { type: string, default: "0 3 * * 1" }
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: ["Pending", "Running", "Failed", "Updating"]
                readyReplicas:
                  type: integer
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type: { type: string }
                      status: { type: string }
                      lastTransitionTime: { type: string }
                version:
                  type: string
                uptime:
                  type: string

---
# Operator RBAC
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: rock887-operator
rules:
  - apiGroups: ["rock887.fm"]
    resources: ["rock887platforms", "rock887platforms/finalizers", "rock887platforms/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "replicasets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps", "secrets", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: rock887-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: rock887-operator
subjects:
  - kind: ServiceAccount
    name: rock887-operator
    namespace: rock887-system

---
# Operator Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rock887-operator
  namespace: rock887-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rock887-operator
  template:
    metadata:
      labels:
        app: rock887-operator
    spec:
      serviceAccountName: rock887-operator
      containers:
        - name: operator
          image: ghcr.io/markec12345678/rivendellradio-operator:4.4.1
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          env:
            - name: WATCH_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: OPERATOR_NAME
              value: "rock887-operator"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5

---
# Example: Rock 88.7 instance
# kubectl apply -f k8s/rock887-instance.yaml
apiVersion: rock887.fm/v1
kind: Rock887Platform
metadata:
  name: rock887-prod
  namespace: rock887
spec:
  version: "4.4.1"
  webReplicas: 3
  feedReplicas: 2
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "2000m"
      memory: "2Gi"
  database:
    storage: "50Gi"
    storageClass: "fast-ssd"
    backupSchedule: "0 2 * * *"
    backupRetention: 90
  broadcast:
    stationId: "main-fm"
    frequency: "88.7"
    icecastUrl: "http://icecast.rock887.fm:8000"
    rdxportUrl: "http://rivendell.rock887.fm/rdxport.cgi"
  observability:
    otelCollector: "http://otel-collector.observability:4318"
    prometheus: true
    grafana: true
    loki: true
  ha:
    enabled: true
    raftCluster: true
    failoverThreshold: 60
  eas:
    ipawsEnabled: true
    cogId: "COG-ROCK887-001"
    testSchedule: "0 3 * * 1"

---
# ============================================================================
# K8s Operator Enhancements — production-grade deployment patterns
# ============================================================================

---
# HorizontalPodAutoscaler — auto-scale web pods based on CPU + memory
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rock887-web-hpa
  namespace: rock887
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rock887-web
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 50
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 25
          periodSeconds: 60

---
# PodDisruptionBudget — ensure minimum available pods during voluntary disruptions
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: rock887-web-pdb
  namespace: rock887
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: rock887-web

---
# PodDisruptionBudget — broadcast-feed (critical, 1 min available)
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: rock887-feed-pdb
  namespace: rock887
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: rock887-feed

---
# Prometheus ServiceMonitor — auto-discovery for Prometheus scraping
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: rock887-web-monitor
  namespace: rock887
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      app: rock887-web
  endpoints:
    - port: http
      path: /api/v1/metrics
      interval: 10s
      scrapeTimeout: 5s
      honorLabels: true

---
# ServiceMonitor — broadcast-feed
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: rock887-feed-monitor
  namespace: rock887
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      app: rock887-feed
  endpoints:
    - port: http
      path: /metrics
      interval: 10s

---
# Canary Deployment — gradual rollout (5% → 25% → 50% → 100%)
# Requires Argo Rollouts or Flagger
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: rock887-web-canary
  namespace: rock887
spec:
  replicas: 4
  strategy:
    canary:
      canaryService: rock887-web-canary
      stableService: rock887-web-stable
      trafficRouting:
        nginx:
          stableIngress: rock887-web-ingress
      steps:
        - setWeight: 5
        - pause: { duration: 5m }
        - setWeight: 25
        - pause: { duration: 5m }
        - setWeight: 50
        - pause: { duration: 5m }
        - setWeight: 100
      analysis:
        templates:
          - templateName: success-rate
        args:
          - name: service-name
            value: rock887-web-canary
  selector:
    matchLabels:
      app: rock887-web
  template:
    metadata:
      labels:
        app: rock887-web
    spec:
      containers:
        - name: web
          image: ghcr.io/markec12345678/rivendellradio:latest
          ports:
            - containerPort: 3000
              name: http
          readinessProbe:
            httpGet:
              path: /api/v1/health/ready
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health/live
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20

---
# AnalysisTemplate — auto-rollback if error rate >5% or P95 >500ms
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: success-rate
  namespace: rock887
spec:
  args:
    - name: service-name
  metrics:
    - name: success-rate
      interval: 1m
      successCondition: result[0] >= 0.95
      failureLimit: 3
      provider:
        prometheus:
          address: http://prometheus-server.observability:9090
          query: |
            sum(rate(http_requests_total{service="{{args.service-name}}",status!~"5.."}[2m]))
            /
            sum(rate(http_requests_total{service="{{args.service-name}}"}[2m]))
    - name: latency-p95
      interval: 1m
      successCondition: result[0] < 500
      failureLimit: 3
      provider:
        prometheus:
          address: http://prometheus-server.observability:9090
          query: |
            histogram_quantile(0.95, sum(rate(http_request_duration_ms_bucket{service="{{args.service-name}}"}[2m])) by (le))
