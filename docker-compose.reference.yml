# ============================================================================
# docker-compose.reference.yml — Rock 88.7 Full Reference Deployment
#
# One command to run the ENTIRE platform (app + feed + observability stack):
#   docker compose -f docker-compose.reference.yml up -d
#
# Then open:
#   - Dashboard:     http://localhost:3000
#   - Grafana:       http://localhost:3001 (admin/admin)
#   - Prometheus:    http://localhost:9090
#   - Alertmanager:  http://localhost:9093
#   - Loki:          http://localhost:3100 (API only)
#   - Status Page:   http://localhost:3000/status
# ============================================================================

name: rock887-reference

services:
  # ============================================================================
  # Rock 88.7 Web Application (Next.js)
  # ============================================================================
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rock887-web
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/db/custom.db
      - BROADCAST_FEED_URL=http://broadcast-feed:3003
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-dev-secret-change-me}
      - DEPLOY_COLOR=blue
    volumes:
      - db-data:/app/db
    depends_on:
      broadcast-feed:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/v1/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - rock887

  # ============================================================================
  # Broadcast Feed (WebSocket real-time telemetry)
  # ============================================================================
  broadcast-feed:
    build:
      context: ./mini-services/broadcast-feed
      dockerfile: Dockerfile
    container_name: rock887-feed
    ports:
      - "3003:3003"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3003/"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - rock887

  # ============================================================================
  # Observability Stack — Prometheus (metrics)
  # ============================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: rock887-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/rules/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    restart: unless-stopped
    networks:
      - rock887

  # ============================================================================
  # Observability Stack — Grafana (dashboards)
  # ============================================================================
  grafana:
    image: grafana/grafana:latest
    container_name: rock887-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/broadcast-overview.json
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped
    networks:
      - rock887

  # ============================================================================
  # Observability Stack — Loki (log aggregation)
  # ============================================================================
  loki:
    image: grafana/loki:3.0.0
    container_name: rock887-loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/tmp/loki
    command:
      - '-config.file=/etc/loki/local-config.yaml'
    restart: unless-stopped
    networks:
      - rock887

  # ============================================================================
  # Observability Stack — Promtail (log shipper)
  # ============================================================================
  promtail:
    image: grafana/promtail:3.0.0
    container_name: rock887-promtail
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/log:/var/log:ro
      - ./promtail/promtail.yml:/etc/promtail/config.yml:ro
      - ./dev.log:/home/z/my-project/dev.log:ro
    command:
      - '-config.file=/etc/promtail/config.yml'
    depends_on:
      - loki
    restart: unless-stopped
    networks:
      - rock887

  # ============================================================================
  # Observability Stack — Alertmanager (alert routing)
  # ============================================================================
  alertmanager:
    image: prom/alertmanager:latest
    container_name: rock887-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./alertmanager/templates.tmpl:/etc/alertmanager/templates/templates.tmpl:ro
      - alertmanager-data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    restart: unless-stopped
    networks:
      - rock887

# ============================================================================
# Persistent Volumes
# ============================================================================
volumes:
  db-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  loki-data:
    driver: local
  alertmanager-data:
    driver: local

# ============================================================================
# Network
# ============================================================================
networks:
  rock887:
    driver: bridge
