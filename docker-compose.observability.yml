# ============================================================================
# docker-compose.observability.yml — Rock 88.7 observability stack
#   Prometheus + Grafana + Alertmanager
#
# Bring the stack up:
#   docker compose -f docker-compose.observability.yml --profile observability up -d
#
# Then open:
#   - Grafana      → http://localhost:3001   (admin / admin)
#   - Prometheus   → http://localhost:9090
#   - Alertmanager → http://localhost:9093
#   - Loki         → http://localhost:3100
#   - Promtail     → http://localhost:9080/metrics
# ============================================================================

name: rock887-observability

services:
  # --------------------------------------------------------------------------
  # Prometheus — scrapes the Next.js /api/v1/metrics endpoint every 10s
  # --------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: rock887-prometheus
    profiles: ["observability"]
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/rules/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - rock887-obs

  # --------------------------------------------------------------------------
  # Grafana — auto-provisioned datasource + dashboards on first boot
  # --------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: rock887-grafana
    profiles: ["observability"]
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/broadcast-overview.json
      - GF_SERVER_ROOT_URL=http://localhost:3001
      - GF_INSTALL_PLUGINS=
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped
    networks:
      - rock887-obs

  # --------------------------------------------------------------------------
  # Loki — log aggregation backend. Receives pushes from Promtail on :3100
  # and serves LogQL queries to Grafana. Single-node TSDB + filesystem store.
  # --------------------------------------------------------------------------
  loki:
    image: grafana/loki:3.0.0
    container_name: rock887-loki
    profiles: ["observability"]
    ports:
      - "3100:3100"
      - "9096:9096"
    volumes:
      - ./loki/loki.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/tmp/loki
    command:
      - '-config.file=/etc/loki/local-config.yaml'
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - rock887-obs

  # --------------------------------------------------------------------------
  # Promtail — ships logs to Loki. Tails dev.log + broadcast-feed logs,
  # discovers rock887-* containers via docker_sd_configs, and reads
  # journald. The Docker socket is mounted read-only for container discovery.
  # --------------------------------------------------------------------------
  promtail:
    image: grafana/promtail:3.0.0
    container_name: rock887-promtail
    profiles: ["observability"]
    ports:
      - "9080:9080"
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/log:/var/log:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./promtail/promtail.yml:/etc/promtail/config.yml:ro
      - ./dev.log:/home/z/my-project/dev.log:ro
      - ./mini-services/broadcast-feed:/home/z/my-project/mini-services/broadcast-feed:ro
      - promtail-data:/tmp
    command:
      - '-config.file=/etc/promtail/config.yml'
    depends_on:
      - loki
    restart: unless-stopped
    networks:
      - rock887-obs

  # --------------------------------------------------------------------------
  # Alertmanager — receives alerts from Prometheus /api/v1/rules and routes them
  # --------------------------------------------------------------------------
  alertmanager:
    image: prom/alertmanager:latest
    container_name: rock887-alertmanager
    profiles: ["observability"]
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./alertmanager/templates.tmpl:/etc/alertmanager/templates/templates.tmpl:ro
      - alertmanager-data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=http://localhost:9093'
    restart: unless-stopped
    networks:
      - rock887-obs

volumes:
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  alertmanager-data:
    driver: local
  loki-data:
    driver: local
  promtail-data:
    driver: local

networks:
  rock887-obs:
    driver: bridge
